spring:
  application:
    name: customer-api

  datasource:
    url: jdbc:oracle:thin:@localhost:1522/XEPDB1
    username: customer_user
    password: customer_pass
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html